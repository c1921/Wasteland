name: Deploy GitHub Pages
on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-stable-preview
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Decide deploy target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          REF="${GITHUB_REF}"

          if [[ "$REF" == refs/tags/v* ]]; then
            TARGET_DIR="stable"
          else
            TARGET_DIR="preview"
          fi

          BASE="/$TARGET_DIR/"

          echo "dir=$TARGET_DIR" >> "$GITHUB_OUTPUT"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          BASE: ${{ steps.target.outputs.base }}
        shell: bash
        run: |
          set -euo pipefail
          echo "Building with base: $BASE"
          npm run build -- --base="$BASE"

      - name: Prepare gh-pages workspace
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm -rf gh-pages

          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages exists, checking out..."
            git clone --branch gh-pages --single-branch \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
              gh-pages
          else
            echo "gh-pages not found, initializing..."
            mkdir gh-pages
            cd gh-pages
            git init
            git checkout --orphan gh-pages
            git remote add origin \
              "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            cd ..
          fi

      - name: Publish to gh-pages
        shell: bash
        env:
          TARGET_DIR: ${{ steps.target.outputs.dir }}
        run: |
          set -euo pipefail

          rm -rf "gh-pages/$TARGET_DIR"
          mkdir -p "gh-pages/$TARGET_DIR"
          cp -a dist/. "gh-pages/$TARGET_DIR/"

          cat > "gh-pages/index.html" <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=./stable/" />
              <link rel="canonical" href="./stable/" />
              <title>Redirecting...</title>
            </head>
            <body>
              <script>location.replace("./stable/");</script>
              <noscript><a href="./stable/">Go to stable</a></noscript>
            </body>
          </html>
          EOF

          echo "wasteland.bemon.space" > "gh-pages/CNAME"
          touch "gh-pages/.nojekyll"

      - name: Commit & Push
        shell: bash
        run: |
          set -euo pipefail
          cd gh-pages

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            git commit -m "Deploy tag to stable/ (root -> stable)"
          else
            git commit -m "Deploy main to preview/ (root -> stable)"
          fi

          git push origin gh-pages
